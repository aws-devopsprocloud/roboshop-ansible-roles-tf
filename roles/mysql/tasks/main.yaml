- name: Installing mysql server 
  ansible.builtin.dnf:
    name: mysql-server 
    state: present 

- name: Starting and Enabling mysql services 
  ansible.builtin.service:
    name: mysqld 
    enabled: yes 
    state: started

- name: Changing the Root password 
  ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ lookup('amazon.aws.aws_ssm', '/roboshop/{{env}}/mysql_root_password', region='us-east-1', decrypt=True ) }}"
  
