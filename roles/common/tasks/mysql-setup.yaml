- name: Installing mysql 
  ansible.builtin.dnf:
    name: mysql 
    state: present 

- name: Check cities schema exist or not 
  ansible.builtin.command: mysql -h {{MYSQL_HOST}} -uroot -p{{mysql_root_password}} -sN -e "SELECT COUNT(*) FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = 'cities'"
  register: cities_schema

- name: Loading schema into mysql database
  ansible.builtin.shell: mysql -h {{MYSQL_HOST}} -uroot -p{{mysql_root_password}} < /app/db/schema.sql
  when: cities_schema.stdout == "0"

- name: Loading app-user schema into mysql database 
  ansible.builtin.shell: mysql -h {{MYSQL_HOST}} -uroot -p{{mysql_root_password}} < /app/db/app-user.sql
  when: cities_schema.stdout == "0"

- name: Loading master-data schema into mysql database 
  ansible.builtin.shell: mysql -h {{MYSQL_HOST}} -uroot -p{{mysql_root_password}} < /app/db/master-data.sql
  when: cities_schema.stdout == "0"