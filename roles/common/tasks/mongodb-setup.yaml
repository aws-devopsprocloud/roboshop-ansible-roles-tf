- name: Copying MondoDB repo 
  ansible.builtin.copy:
    src: mongodb.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Installing mongodb 
  ansible.builtin.package:
    name: mongodb-mongosh
    state: present 

- name: "Get the {{component}} Count"
  ansible.builtin.command: mongosh --host {{MONGODB_HOST}} --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: "catalogue_count"

- name: "Read {{component}} Count"
  ansible.builtin.debug:
    msg: "catalogue Count is : {{catalogue_count}}"

- name: loading catalogue data into MongoDB 
  ansible.builtin.shell: mongosh --host {{MONGODB_HOST}} </app/db/master-data.js
  when: catalogue_count.stdout != "0"