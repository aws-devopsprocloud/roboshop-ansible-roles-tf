- name: Copying rabbitmq repo 
  ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo

- name: installing rabbitmq server 
  ansible.builtin.dnf: 
    name: rabbitmq-server 
    state: present

- name: start and enable rabbitmq 
  ansible.builtin.service:
    name: rabbitmq-server 
    state: started 
    enabled: yes 

- name: Adding roboshop user credentials and Setting permissions
  community.rabbitmq.rabbitmq_user:
    user: "{{ lookup('amazon.aws.aws_ssm', '/roboshop/{{env}}/rabbitmq_user', region='us-east-1', decrypt=True ) }}"
    password: "{{ lookup('amazon.aws.aws_ssm', '/roboshop/{{env}}/rabbitmq_password', region='us-east-1', decrypt=True ) }}"
    vhost: /
    configure_priv: .*
    read_priv: .*
    write_priv: .*
    state: present
